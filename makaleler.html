<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makaleler — Avrasya Araştırmaları Bülteni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">&#9733;</span>
                <span class="logo-text">Avrasya Araştırmaları Bülteni</span>
            </a>
            <button class="mobile-toggle" id="mobileToggle" aria-label="Menüyü aç">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="makaleler.html" class="active">Makaleler</a></li>
                <li><a href="kitaplar.html">Kitaplar</a></li>
                <li><a href="sempozyumlar.html">Sempozyumlar</a></li>
                <li><a href="hakkimda.html">Hakkında</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container page-header">
            <h1>Makaleler</h1>
            <p>Avrasya coğrafyası üzerine güncel akademik makaleler</p>
        </div>
        <div class="container" id="makalelerContainer" style="padding-bottom:64px;"></div>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <p>&copy; 2026 Avrasya Araştırmaları Bülteni. Tüm hakları saklıdır.</p>
            <p class="footer-credit">Akademik bilgi paylaşımı amacıyla hazırlanmıştır.</p>
        </div>
    </footer>

    <script>
        document.getElementById('mobileToggle').addEventListener('click', function() {
            const links = document.getElementById('navLinks');
            links.classList.toggle('open');
            this.textContent = links.classList.contains('open') ? '✕' : '☰';
        });

        fetch('data/yayinlar.json')
            .then(r => r.json())
            .then(data => {
                const makaleler = data.filter(y => y.tur === 'makale');
                const container = document.getElementById('makalelerContainer');
                container.innerHTML = makaleler.map(y => kartHtml(y)).join('');
                if (!makaleler.length) container.innerHTML = '<p>Henüz makale bulunmamaktadır.</p>';
            })
            .catch(() => {
                document.getElementById('makalelerContainer').innerHTML = '<p style="padding:40px 0;color:#6b5f53;">Veriler yüklenemedi.</p>';
            });

        function kartHtml(y) {
            const etiketler = y.etiket && y.etiket.length
                ? y.etiket.map(e => `<span style="background:#dfe6e9;color:#2d3436;font-size:0.7rem;padding:2px 8px;border-radius:3px;margin-right:4px;">${e}</span>`).join('')
                : '';
            return `
                <article class="card">
                    <div class="card-meta">
                        <span class="card-tag makale">Makale</span>
                        <span class="card-source">${y.kaynak || ''}</span>
                    </div>
                    <h3 class="card-title"><a href="${y.link || '#'}" target="_blank" rel="noopener">${y.baslik}</a></h3>
                    ${y.yazarlar ? `<p class="card-authors">${y.yazarlar}</p>` : ''}
                    ${y.dergi ? `<p class="card-journal">${y.dergi}</p>` : ''}
                    <p class="card-abstract">${y.ozet}</p>
                    <div style="margin-bottom:10px;">${etiketler}</div>
                    <div class="card-footer">
                        <span class="card-date">${y.tarih || ''}</span>
                        <a href="${y.link || '#'}" target="_blank" rel="noopener" class="card-link">Kaynağa Git →</a>
                    </div>
                </article>
            `;
        }
    </script>
</body>
</html>
